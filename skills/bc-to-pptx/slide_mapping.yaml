# Slide Mapping Configuration for BC-to-PPTX Pipeline
# Maps LEAN_BUSINESS_CASE.md sections to template slide XML elements
# NOTE: This file was generated for the old 38-slide template. The current template is 67 slides.
# slide_mapping.yaml is superseded by semantic_mapping.yaml (v4.0) as the authoritative tag reference.
# This file is retained for historical reference but is NOT used by bc-to-pptx generation.
#
# Each slide entry:
#   deck_position: position in the output deck
#   bc_section: which BC section provides the data
#   bc_section: which BC section provides the data
#   type: slide|smartart|table|static
#   fields: list of {json_key, target_description}
#
# Field injection rules:
#   - For type=slide: replace <a:t> elements in slide{N}.xml
#   - For type=smartart: replace <a:t>/<dgm:t> in data{N}.xml
#   - For type=table: replace cell values in slide{N}.xml table elements
#   - For type=static: skip (no injection)

slides:

  # ===== COVER & NAVIGATION =====
  - deck_position: 1
    potx_slide: 1
    bc_section: "meta"
    type: slide
    layout: title_dark
    fields:
      - key: offering_name
        target: "line 2 of title block (after 'GTM Lean Business Case')"
      - key: iteration
        target: "line 3 of title block"
      - key: subtitle
        target: "bottom text line (Cloud and IT...)"

  - deck_position: 2
    potx_slide: 2
    bc_section: "meta"
    type: slide
    layout: toc_split
    fields: []  # TOC is static structure, no injection needed

  - deck_position: 3
    potx_slide: 3
    bc_section: null
    type: static
    layout: digital_first
    fields: []  # User copies manually

  - deck_position: 4
