<!doctype html>
<!--
  openTrattOS · Owner dashboard · Module 2 / Journey 3
  Margin watch — bottom 5 / top 5 by margin, last 7 days. Mobile-first, 375px portrait canvas.
  Pulcinella palette + DESIGN.md tokens. Owner persona (Roberto), Sunday-night sofa, one-handed.

  typography (DESIGN.md §3):
    - System sans for chrome. Fraunces serif on the page title and on dish names —
      "menu nouns" wink, same logical role as the recipe title in J1. Sub-text and
      chrome stay system sans. font-display:swap to hold the <1.5s NFR.
    - tabular-nums + lining-nums on every digit (margin %, sold count, aggregate).
    - Min body 13px. The delta-vs-target line is --text-sm 13px on --bg → --mute
      contrast verified ≥4.5:1.

  color (DESIGN.md §2, WCAG-AA):
    --ink #1B1916 on --bg #F4EFE6        ~14:1   AA+ body
    --mute #6B6557 on --bg               ~5.0:1  AA body (delta line, sold count)
    --mute on --surface #ECE4D6          ~4.6:1  AA body (rank circle numeral)
    --ink on --surface                   ~13:1   AA+ (rank circle numeral default)
    --destructive #A8392F on --bg        ~5.6:1  AA semantic (sub-target margin)
    --success #5F7A4A on --bg            ~4.6:1  AA semantic (above-target margin)
    Colour is a cue, never alone — every flagged margin is paired with an explicit
    "-13.2 pp from 70 % target" text delta. Article 21 not applicable on this surface.

  spatial (DESIGN.md §5, mobile reach):
    - 375px canvas, design for thumb in the bottom 2/3. Header is sticky (top); tab
      bar is fixed (bottom, safe-area-inset-bottom respected) — both are reachable
      with the right thumb without re-grip. Drill chevrons sit on the right edge,
      reachable on the same arc.
    - Touch targets: every rank row ≥64px (well above 48px floor); tab-bar items
      56px tall and full-width-divided; chip controls 40px tall × 12px padding,
      with ::before hit-area expansion to 48px.
    - Cards reserved for distinct data domains: bottom-5 and top-5 are flat lists,
      not nested cards. The aggregate strip and tab bar are flat-bordered surfaces.
      No shadows, no glassmorphism on the sticky header (a 1px --border hairline
      carries the separation).

  motion (DESIGN.md §7):
    - 100/300ms only. prefers-reduced-motion disables transitions globally.
    - No celebration on top-5; no shake on bottom-5. Discipline is the design.

  anti-patterns avoided: emoji rank numerals, hero-metric, side-tab, nested-cards,
  monotonous-spacing, gradient-text, drop shadows, all-caps body, em dashes.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Mobile portrait canvas. The browser may render wider; the layout is locked
       to 375px content width via .canvas. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Margin watch · openTrattOS · Owner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" />

  <style>
    :root {
      /* Pulcinella palette — OKLCH canonical (DESIGN.md §2). Hex in comments is derivation only. */
      --bg:           oklch(94.5% 0.012 70);    /* #F4EFE6 warm cream */
      --surface:      oklch(91.5% 0.014 70);    /* #ECE4D6 oat */
      --surface-2:    oklch(88.5% 0.014 70);    /* sticky header strip */
      --ink:          oklch(20%   0.010 60);    /* #1B1916 warm charcoal */
      --mute:         oklch(48%   0.012 70);    /* #6B6557 warm mid-grey */
      --border:       oklch(83%   0.018 70);    /* #D9CFBF sand */
      --accent:       oklch(54%   0.072 190);   /* #2E8B85 aged turquoise */
      --accent-fg:    oklch(99%   0.003 190);   /* #FAFCFB */
      --success:      oklch(53%   0.080 130);   /* #5F7A4A sage olive */
      --destructive:  oklch(48%   0.150 32);    /* #A8392F paprika */
      --warn-bg:      oklch(91%   0.045 80);    /* #F2E3C8 soft sand */

      /* spacing (DESIGN.md §5) */
      --s-2xs:  4px;
      --s-xs:   8px;
      --s-sm:  12px;
      --s-md:  16px;
      --s-lg:  24px;
      --s-xl:  32px;

      /* type scale */
      --text-xs: 12px;
      --text-sm: 13px;
      --text-md: 14px;
      --text-lg: 18px;
      --text-xl: 22px;
      --text-2xl: 28px;

      /* motion */
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --dur-fast: 100ms;
      --dur-md: 300ms;

      /* radii */
      --r-sm: 4px;
      --r-md: 8px;
      --r-pill: 999px;

      /* type stacks */
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-serif: "Fraunces", ui-serif, Georgia, "Times New Roman", serif;

      --tab-bar-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-md);
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3 { margin: 0; line-height: 1.2; text-wrap: balance; }
    p { margin: 0; }

    .num {
      font-variant-numeric: tabular-nums lining-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
    }

    /* Focus ring — DESIGN.md §7 */
    :focus { outline: none; }
    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    /* Top context strip — analogous to J1's .provenance, but mobile-tight */
    .provenance {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      padding: var(--s-sm) var(--s-md);
      font-size: var(--text-sm);
      color: var(--mute);
    }
    .provenance b {
      color: var(--ink);
      font-weight: 600;
    }

    /* Mobile canvas — locks the design to 375px portrait */
    .canvas {
      max-width: 375px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      padding-bottom: calc(var(--tab-bar-h) + env(safe-area-inset-bottom, 0px) + var(--s-lg));
      position: relative;
    }

    /* Sticky header — brand strip + filter chips */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .brand {
      padding: var(--s-sm) var(--s-md);
      font-size: var(--text-xs);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mute);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand b { color: var(--ink); font-weight: 600; letter-spacing: 0.04em; }

    .filters {
      display: flex;
      gap: var(--s-xs);
      padding: var(--s-sm) var(--s-md);
      align-items: center;
    }
    .chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 40px;
      padding: var(--s-xs) var(--s-sm);
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-family: inherit;
      cursor: pointer;
      transition: background-color var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease);
    }
    /* hit-area expansion to 48px without changing the visual */
    .chip::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: var(--r-pill);
    }
    .chip:hover { background: var(--bg); }
    .chip:active { background: var(--surface-2); }
    .chip .caret {
      width: 10px; height: 10px;
      flex: none;
      color: var(--mute);
    }
    .chip b { font-weight: 600; }

    /* Page title */
    .title-block {
      padding: var(--s-md) var(--s-md) var(--s-xs);
    }
    .title-block h1 {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: var(--text-2xl);
      font-variation-settings: "opsz" 96;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .title-block .sub {
      margin-top: var(--s-2xs);
      font-size: var(--text-sm);
      color: var(--mute);
    }

    /* Section header */
    .section-h {
      padding: var(--s-lg) var(--s-md) var(--s-xs);
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .section-h .hint {
      font-size: var(--text-xs);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
    }

    /* MenuItemRanker — stack-row card */
    .ranker {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--border);
    }
    .ranker li {
      border-bottom: 1px solid var(--border);
    }
    .row {
      display: grid;
      grid-template-columns: 36px 1fr auto 16px;
      gap: var(--s-sm);
      align-items: center;
      width: 100%;
      min-height: 64px;
      padding: var(--s-sm) var(--s-md);
      background: transparent;
      border: none;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      transition: background-color var(--dur-fast) var(--ease);
    }
    .row:hover { background: var(--surface); }
    .row:active { background: var(--surface-2); }

    .rank {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0;
    }

    .info { min-width: 0; }
    .dish {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: var(--text-lg);
      font-variation-settings: "opsz" 24;
      color: var(--ink);
      letter-spacing: -0.005em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .delta {
      margin-top: 2px;
      font-size: var(--text-sm);
      color: var(--mute);
      line-height: 1.3;
    }
    .volume {
      margin-top: 1px;
      font-size: var(--text-sm);
      color: var(--mute);
      line-height: 1.3;
    }

    .margin {
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1;
      white-space: nowrap;
    }
    .margin.--down  { color: var(--destructive); }
    .margin.--up    { color: var(--success); }
    .margin.--flat  { color: var(--ink); }

    .chev {
      color: var(--mute);
      font-size: var(--text-lg);
      line-height: 1;
      width: 16px;
      text-align: right;
      font-family: var(--font-sans);
    }

    /* Aggregate strip — flat-bordered, accent top rule (DESIGN.md §6) */
    .aggregate {
      margin: var(--s-lg) var(--s-md) 0;
      padding: var(--s-md);
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: var(--r-md);
      display: flex;
      flex-direction: column;
      gap: var(--s-2xs);
    }
    .aggregate .label {
      font-size: var(--text-xs);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
    }
    .aggregate .value {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--ink);
    }
    .aggregate .meta {
      font-size: var(--text-sm);
      color: var(--mute);
    }

    /* Bottom tab bar — fixed, thumb-reach zone */
    .tab-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-width: 375px;
      margin: 0 auto;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      z-index: 20;
    }
    .tab {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: var(--tab-bar-h);
      padding: 6px 4px;
      background: transparent;
      border: none;
      color: var(--mute);
      font: inherit;
      font-size: var(--text-xs);
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease);
    }
    .tab svg {
      width: 22px; height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab[aria-current="page"] {
      color: var(--ink);
    }
    .tab[aria-current="page"]::after {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    .tab:hover { color: var(--ink); }

    /* Reduced motion (DESIGN.md §7) */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* On wider screens (e.g. desktop preview), keep the canvas at phone width
       and centre it on a soft cream field — the layout is portrait by design. */
    @media (min-width: 540px) {
      body { background: var(--surface); }
      .canvas {
        margin-top: var(--s-lg);
        margin-bottom: var(--s-lg);
        min-height: 812px;
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
      }
      .tab-bar { left: auto; right: auto; }
    }
  </style>
</head>
