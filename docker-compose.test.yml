services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nexandro_test
      POSTGRES_PASSWORD: nexandro_test
      POSTGRES_DB: nexandro_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexandro_test -d nexandro_test"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
