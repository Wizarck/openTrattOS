name: Build + push omnibus image

# m3.x-app-bootstrap-and-vps-deploy slice §4.1.
#
# Builds the single openTrattOS omnibus image (per ADR-028) and pushes
# to GHCR with two tags: `:latest` + `:sha-<7-char-git-sha>`. Triggers on
# master pushes that touch app code / Dockerfile / deploy artifacts, and
# on `workflow_dispatch` for ad-hoc rebuilds.

on:
  push:
    branches: [master]
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

# Cancel an in-flight build when a newer commit lands on the same ref.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opentrattos:latest
            ghcr.io/${{ github.repository_owner }}/opentrattos:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print published tags
        run: |
          echo "Published:"
          echo "  ghcr.io/${{ github.repository_owner }}/opentrattos:latest"
          echo "  ghcr.io/${{ github.repository_owner }}/opentrattos:sha-${{ steps.sha.outputs.short }}"
