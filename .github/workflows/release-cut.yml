# release-cut.yml — zero-touch release for consumer repos. Copied by
# scripts/bootstrap.py. See ai-playbook/.github/workflows/release-cut.yml
# for the canonical version this template mirrors.

name: release-cut

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install playbook tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Run release_cut
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          AIPLAYBOOK_NOTIFICATIONS_TO: ${{ secrets.AIPLAYBOOK_NOTIFICATIONS_TO }}
          ATLASSIAN_URL: ${{ secrets.ATLASSIAN_URL }}
          ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          AIPLAYBOOK_JIRA_DEFAULT_PROJECT: ${{ secrets.AIPLAYBOOK_JIRA_DEFAULT_PROJECT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=.ai-playbook python -m scripts.release_cut --tag ${{ github.ref_name }}

      - name: Upload notifications log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notifications-${{ github.ref_name }}
          path: .ai-playbook/notifications.jsonl
          if-no-files-found: ignore
