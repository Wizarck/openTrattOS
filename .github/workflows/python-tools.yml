name: Python tools (rag-proxy + rag-corpus)

# CI for the Python tooling that lives outside the Turborepo TypeScript
# workspaces. The two packages (`tools/rag-proxy` + `tools/rag-corpus`)
# back the AI yield/waste suggestion engine in production.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - 'tools/rag-proxy/**'
      - 'tools/rag-corpus/**'
      - '.github/workflows/python-tools.yml'

permissions:
  contents: read

concurrency:
  group: python-tools-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rag-proxy:
    name: rag-proxy (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/rag-proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/rag-proxy/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/
      - name: Pytest
        run: pytest

  rag-corpus:
    name: rag-corpus (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/rag-corpus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/rag-corpus/pyproject.toml
      - name: Install (dev only — skips heavy raganything[all] for CI speed)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/
      - name: Pytest
        run: pytest
