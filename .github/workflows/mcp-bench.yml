name: MCP-bench

# CI for the MCP-client benchmark harness in tools/mcp-bench/.
# Two jobs:
#   - lint-test-build: runs on every PR that touches the harness or this
#     workflow file. No VPS hit; pure unit/lint/build.
#   - bench: runs only on workflow_dispatch. Drives a real bench against
#     the VPS Hermes deployment, uploads the report as an artifact, runs
#     a regression check vs the previous most-recent committed report,
#     and (when commit_report=true) commits the new report via the
#     github-actions[bot] user.
#
# Per ADR (Wave 1.16 m2-mcp-bench-ci): this is the smallest viable CI
# integration. Cron schedule + multi-client matrix (Claude Desktop /
# OpenCode stdio adapters) are filed as separate slices.

on:
  pull_request:
    branches: [master]
    paths:
      - 'tools/mcp-bench/**'
      - '.github/workflows/mcp-bench.yml'
  workflow_dispatch:
    inputs:
      client:
        description: 'MCP client to bench'
        type: choice
        options:
          - hermes
        default: hermes
      duration:
        description: 'Bench window (e.g. 60s, 5m)'
        type: string
        default: '60s'
      regression_threshold_pct:
        description: 'Fail if any p95 regresses by more than this percent'
        type: string
        default: '20'
      commit_report:
        description: 'Commit the new report to docs/bench/'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: mcp-bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-bench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'tools/mcp-bench/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  bench:
    name: bench (${{ inputs.client }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-bench
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git push of the bot commit works cleanly
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'tools/mcp-bench/package-lock.json'
      - run: npm ci

      - name: Locate baseline report (before run)
        id: baseline
        run: |
          # Pick the most recent committed report for this client BEFORE
          # the bench writes its new file. Empty when this is the first run
          # for the client.
          latest=$(ls -1t ../../docs/bench/*-${{ inputs.client }}.md 2>/dev/null | head -1 || true)
          echo "path=${latest}" >> "$GITHUB_OUTPUT"
          echo "Baseline: ${latest:-<none>}"

      - name: Run bench
        env:
          OPENTRATTOS_HERMES_BASE_URL: ${{ secrets.OPENTRATTOS_HERMES_BASE_URL }}
          OPENTRATTOS_HERMES_AUTH_SECRET: ${{ secrets.OPENTRATTOS_HERMES_AUTH_SECRET }}
          HERMES_VERSION: ${{ vars.HERMES_VERSION || 'wamba-overlay' }}
        run: npx tsx src/run.ts --client=${{ inputs.client }} --duration=${{ inputs.duration }}

      - name: Locate new report
        id: new-report
        run: |
          new=$(ls -1t ../../docs/bench/*-${{ inputs.client }}.md | head -1)
          echo "path=${new}" >> "$GITHUB_OUTPUT"
          echo "New report: ${new}"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-bench-${{ inputs.client }}-${{ github.run_id }}
          path: ${{ steps.new-report.outputs.path }}

      - name: Regression check
        if: steps.baseline.outputs.path != ''
        run: |
          # Compare new vs baseline; exit 1 if p95 regresses > threshold.
          npx tsx scripts/regression-check.ts \
            "${{ steps.new-report.outputs.path }}" \
            "${{ steps.baseline.outputs.path }}" \
            "${{ inputs.regression_threshold_pct }}"

      - name: Commit new report
        if: ${{ inputs.commit_report }}
        run: |
          cd ../..
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/bench/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "bench(mcp): ${{ inputs.client }} run $(date -u +%Y-%m-%d) (workflow_dispatch by ${{ github.actor }})"
          # Push to whatever ref the workflow was dispatched from. Operators
          # who run from a non-master ref get the commit on that ref.
          git push origin "HEAD:${GITHUB_REF_NAME}"
